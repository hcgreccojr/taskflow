name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Backend install
        working-directory: backend
        run: npm ci
      - name: Backend lint
        working-directory: backend
        run: npm run lint
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Backend install
        working-directory: backend
        run: npm ci
      - name: Backend prisma generate
        working-directory: backend
        run: npx prisma generate
      - name: Backend test
        working-directory: backend
        run: npm test -- --coverage
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Frontend test
        working-directory: frontend
        run: npm test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Backend install
        working-directory: backend
        run: npm ci
      - name: Backend prisma generate
        working-directory: backend
        run: npx prisma generate
      - name: Backend build
        working-directory: backend
        run: npm run build
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  docker:
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t taskflow-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t taskflow-frontend:ci ./frontend
