name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Backend install
        working-directory: backend
        run: npm ci
      - name: Backend lint
        working-directory: backend
        run: npm run lint
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Backend install
        working-directory: backend
        run: npm ci
      - name: Backend prisma generate
        working-directory: backend
        run: npx prisma generate
      - name: Backend test (with coverage quality gate)
        working-directory: backend
        run: npm run test:cov
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Frontend test (with coverage quality gate)
        working-directory: frontend
        run: npm run test:coverage

  test-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Backend install
        working-directory: backend
        run: npm ci
      - name: Backend e2e tests (Supertest + Postgres real)
        working-directory: backend
        run: npm run test:e2e

  e2e-playwright:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env for docker-compose
        run: cp .env.example .env
      - name: Start full stack
        run: docker compose up -d --build
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health; then exit 0; fi
            sleep 2
          done
          echo "Backend did not become healthy in time" >&2
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright e2e tests
        working-directory: frontend
        run: npm run test:e2e
      - name: Stop stack
        if: always()
        run: docker compose down

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Backend install
        working-directory: backend
        run: npm ci
      - name: Backend prisma generate
        working-directory: backend
        run: npx prisma generate
      - name: Backend build
        working-directory: backend
        run: npm run build
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  docker:
    needs: [build, test-e2e, e2e-playwright]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t taskflow-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t taskflow-frontend:ci ./frontend

  publish:
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/taskflow-backend:latest
            ghcr.io/${{ github.repository_owner }}/taskflow-backend:${{ github.sha }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/taskflow-frontend:latest
            ghcr.io/${{ github.repository_owner }}/taskflow-frontend:${{ github.sha }}
